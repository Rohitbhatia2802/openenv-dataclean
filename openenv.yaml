spec_version: 1
name: data-cleaning-env
version: "1.0.0"
description: >
  A production-grade OpenEnv environment simulating real-world enterprise
  data cleaning and validation pipelines.
author: "OpenEnv Hackathon Submission"
license: MIT

endpoints:
  python: "src.env:DataCleaningEnv"
  server: "server.app:main"
  baseline: "baseline:main"
  grader: "/grader"

environment:
  python_version: "3.10"
  dependencies: requirements.txt
  runtime: fastapi

tasks:
  - id: fix_missing_price
    name: "Fix Missing Price Values (Easy)"
    difficulty: easy
    description: >
      A retail transaction CSV has ~20% of its 'price' column missing or set to
      sentinel value -1.
    dataset: retail_transactions
    max_steps: 20
    success_threshold: 0.95
    grader: "src.graders:EasyGrader"
    score_range: [0.0, 1.0]
    wind: "None"
    assets: "Price column integrity"
    initial_fire: "None"
    reward_shaping: dense

  - id: normalize_customer_pipeline
    name: "Normalize Customer Data Pipeline (Medium)"
    difficulty: medium
    description: >
      A customer CRM export has inconsistent phone formats, mixed-case emails,
      duplicate rows, and out-of-range ages.
    dataset: customer_crm
    max_steps: 35
    success_threshold: 0.90
    grader: "src.graders:MediumGrader"
    score_range: [0.0, 1.0]
    wind: "None"
    assets: "Customer CRM consistency"
    initial_fire: "None"
    reward_shaping: dense

  - id: validate_medical_records
    name: "Validate Medical Records (Hard)"
    difficulty: hard
    description: >
      A hospital EMR export contains date-of-birth / admission-date ordering
      violations, ICD-10 code format errors, and negative dosage values.
    dataset: medical_records
    max_steps: 50
    success_threshold: 0.85
    grader: "src.graders:HardGrader"
    score_range: [0.0, 1.0]
    wind: "None"
    assets: "Medical record safety"
    initial_fire: "None"
    reward_shaping: dense

rewards:
  floor: 0.0
  ceiling: 1.0
  step_penalty: -0.01
  invalid_action_penalty: -0.05
  destructive_action_penalty: -0.10

validation:
  schema_version: "1.0"
  required_methods: [reset, step, state]
  required_models: [Observation, Action, Reward, State]
